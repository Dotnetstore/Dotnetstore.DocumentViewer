# Minimal in-cluster Postgres for evaluation / staging. For production prefer a managed
# service (Cloud SQL, RDS, Azure Database for PostgreSQL) and delete this manifest; the
# WebApi just needs ConnectionStrings__documentviewer set to point at it.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: documentviewer
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: documentviewer
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: documentviewer
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  strategy:
    # Postgres + RWO PVC means at-most-one running pod; rolling is unsafe.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: documentviewer
            - name: POSTGRES_USER
              value: documentviewer
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webapi-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "documentviewer", "-d", "documentviewer"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "documentviewer", "-d", "documentviewer"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
