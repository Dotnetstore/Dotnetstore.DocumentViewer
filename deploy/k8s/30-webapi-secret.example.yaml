# EXAMPLE secret manifest. Copy to webapi-secret.yaml (which is gitignored if you keep
# the *.yaml entry in deploy/k8s/.gitignore), replace every value with real entropy
# (`openssl rand -base64 48` for the signing keys), then `kubectl apply -f` the copy.
#
# Or, preferred for clusters: pipe via `kubectl create secret generic webapi-secrets`
# from a vault / sealed-secret / external-secrets operator so the plaintext never
# touches git.
apiVersion: v1
kind: Secret
metadata:
  name: webapi-secrets
  namespace: documentviewer
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-postgres-password"
  Jwt__SigningKey: "change-me-jwt-key-must-be-at-least-32-characters-long"
  SignedUrl__SigningKey: "change-me-signed-url-key-must-be-at-least-32-characters"
  ApiKey__Value: "change-me-api-key"
  Seed__Admin__Password: "ChangeMeOnFirstLogin123!"
